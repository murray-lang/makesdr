syntax = "proto3";

//import "nanopb.proto";

package RadioSettings;


//import "nanopb.proto";

enum SplitBandId {
  SPLIT_BAND_NONE = 0;
  SPLIT_BAND_ONE = 1;
  SPLIT_BAND_TWO = 2;
}

enum PipelineId {
  PIPELINE_NONE = 0;
  PIPELINE_A = 1;
  PIPELINE_B = 2;
}

enum ModeType {
  MODE_NONE = 0;
  MODE_AMN = 1;
  MODE_AMW = 2;
  MODE_LSB = 3;
  MODE_USB = 4;
  MODE_FMN = 5;
  MODE_FMW = 6;
  MODE_CWL = 7;
  MODE_CWU = 8;
};

enum AgcSpeed {
  AGC_OFF = 0;
  AGC_SLOW = 1;
  AGC_MEDIUM = 2;
  AGC_FAST = 3;
}

message ModePb {
  ModeType type = 1;
  string name = 2;
  string label = 3;
  int32 lo_cut = 4;
  int32 hi_cut = 5;
  int32 offset = 6;
}

message ModeListPb {
  repeated ModePb modes = 1;
}

message BandPb {
  string name = 1;
  string label = 2;
  int64 lowest_frequency = 3;
  int64 highest_frequency = 4;
  int64 landing_frequency = 5;
  int32 default_fine_step = 6;
  int32 default_coarse_step = 7;
  ModeType default_mode = 8;
}

message BandListPb {
  repeated BandPb bands = 1;
}

message BandCategoryPb {
  string name = 1;
  string label = 2;
  BandListPb bands = 3;
}

message BandCategoryListPb {
  repeated BandCategoryPb categories = 1;
}

message SteppableInt64SettingPb {
  int64 value = 1;
  int64 coarse_delta = 2;
  int64 fine_delta = 3;
  bool use_fine = 4;
}

message SteppableFloatSettingPb {
  float value = 1;
  float coarse_delta = 2;
  float fine_delta = 3;
  bool use_fine = 4;
}

//Steppable fields are given a tag over 1000 so that they can be identified when iterating messages

message IqCorrectionSettingsPb {
  SteppableFloatSettingPb amplitude = 1001;
  SteppableFloatSettingPb phase = 1002;
}

message RfSettingsPb {
  SteppableFloatSettingPb gain = 1001;
  SteppableInt64SettingPb centre_frequency = 1002;
  SteppableInt64SettingPb vfo = 1003;
  optional int32 max_negative_vfo_offset = 4;
  optional int32 max_positive_vfo_offset = 5;
}

message IfSettingsPb {
  SteppableFloatSettingPb gain = 1001;
  optional uint32 bandwidth = 2;
}

message MicrophoneSettingsPb {
  SteppableFloatSettingPb gain = 1001;
}

message ReceiverSettings {
  IqCorrectionSettingsPb iq_corrections = 1;

}

message TransmitterSettingsPb {
  IqCorrectionSettingsPb iq_corrections = 1;
  MicrophoneSettingsPb mic = 2;
}

message RxPipelineSettingsPb {
  oneof mode_or_request {
    ModeType mode_request = 1;
    ModePb mode = 2;
  }
  RfSettingsPb rf = 3;
  IfSettingsPb if = 4;
  optional bool mute = 5;
  optional AgcSpeed agc_speed = 6;
}

message TxPipelineSettingsPb {
  oneof mode_or_request {
    ModeType mode_request = 1;
    ModePb mode = 2;
  }
  RfSettingsPb rf = 3;
}

message BandSettingsPb {
  oneof band_or_request {
    string band_request = 1;
    BandPb band = 2;
  }
  RxPipelineSettingsPb pipeline_a = 3;
  optional RxPipelineSettingsPb pipeline_b = 4;
  optional TxPipelineSettingsPb tx_pipeline = 5;
  optional bool is_multi_pipeline = 6;
  optional PipelineId focus_pipeline_id = 7;
  optional PipelineId tx_pipeline_id = 8;
}

message ActiveBandSettingsPb {
  optional SplitBandId focus_band_id = 1;
  optional SplitBandId tx_band_id = 2;
  optional SplitBandId rx_band_id = 3;
  BandSettingsPb band_1 = 4;
  BandSettingsPb band_2 = 5;
  optional bool is_split = 6;
}

message BandSettingsCachePb {
  map<string, BandSettingsPb> band_settings = 1;
}

message RadioSettingsPb {
  optional ReceiverSettings receiver = 1;
  optional TransmitterSettingsPb transmitter = 2;
  ActiveBandSettingsPb active_bands = 3;
  optional bool ptt = 4;
}
